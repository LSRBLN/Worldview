server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Kostenfrei weil Free-Tier / GitHub Student Pack
  # SPA-Fallback für Vite-Routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Kostenfrei weil Free-Tier / GitHub Student Pack
  # ADSB Proxy gegen CORS-Probleme
  location /api/adsb {
    proxy_pass https://opendata.adsb.fi/api/v2/lat/24/lon/44/dist/220;
    proxy_set_header Host opendata.adsb.fi;
    proxy_ssl_server_name on;
  }

  # Kostenfrei weil Free-Tier / GitHub Student Pack
  # OpenSky Proxy gegen Browser-CORS-Probleme
  location /api/opensky/ {
    proxy_pass https://opensky-network.org/api/;
    proxy_set_header Host opensky-network.org;
    proxy_set_header Authorization $http_authorization;
    proxy_ssl_server_name on;
  }
}

